<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>thinktank</title>
    <style>
      :root{
        --paper:#f6f0e3; --bg:#efe7d6; --card:#fbf7ee;
        --ink:#1c1813; --ink-2:#3c352c; --ink-soft:#6b6256;
        --line:#d8cdb6; --line-strong:#c2b599;
        --accent:#FF3D00; --accent-deep:#b32a00; --accent-soft:#ffe5dc;
        color-scheme: light;
      }
      *{box-sizing:border-box}
      body{
        width:308px; margin:0; padding:16px 16px 14px;
        font:13px/1.45 ui-sans-serif,system-ui,-apple-system,"Hanken Grotesk",sans-serif;
        background:var(--paper); color:var(--ink);
      }
      .mono{font-family:ui-monospace,"JetBrains Mono",SFMono-Regular,Menlo,monospace}

      .head{display:flex;align-items:center;justify-content:space-between;gap:10px}
      .logo{height:22px;width:auto;display:block}
      .badge{font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);background:var(--accent-soft);border:1px solid #f6c9bb;padding:3px 7px;border-radius:999px}
      .sub{margin:10px 0 16px;color:var(--ink-soft);font-size:11.5px}

      label{display:block;margin:12px 0 5px;font-family:ui-monospace,monospace;font-weight:600;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft)}
      input{
        width:100%; padding:9px 11px; border-radius:9px; border:1px solid var(--line);
        background:var(--card); color:var(--ink); font-size:13px; outline:none;
        transition:border-color .15s, box-shadow .15s;
      }
      input::placeholder{color:#a89e8c}
      input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,61,0,.12)}
      .row{display:flex;gap:8px}
      .row>*{flex:1}

      button{
        margin-top:10px; width:100%; padding:10px 12px; border-radius:9px;
        cursor:pointer; font-weight:600; font-size:13px;
        border:1px solid transparent; transition:transform .12s, filter .15s, background .15s;
      }
      button:active{transform:translateY(1px)}
      .btn-primary{background:var(--accent);color:#fff;box-shadow:0 10px 22px -12px rgba(255,61,0,.6)}
      .btn-primary:hover{filter:brightness(1.04)}
      .btn-secondary{background:transparent;color:var(--ink);border-color:var(--line-strong)}
      .btn-secondary:hover{background:var(--bg)}
      #test{margin-top:0}

      #status{margin-top:12px;min-height:16px;font-size:11px;font-family:ui-monospace,monospace}
      #status.ok{color:#1f7a3d} #status.err{color:#b3261e} #status.warn{color:#9a6a00}

      .note{margin-top:16px;padding-top:11px;border-top:1px solid var(--line);color:var(--ink-soft);font-size:10px;display:flex;gap:7px;align-items:flex-start}
      .note .dot{flex:0 0 auto;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:4px}
    </style>
  </head>
  <body>
    <div class="head">
      <svg class="logo" viewBox="0 0 218 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="thinktank">
        <defs><radialGradient id="ttg"><stop offset="0" stop-color="#FF3D00" stop-opacity=".55"></stop><stop offset="1" stop-color="#FF3D00" stop-opacity="0"></stop></radialGradient></defs>
        <circle cx="24" cy="24" r="11" fill="url(#ttg)"></circle>
        <line x1="24" y1="24" x2="24" y2="9" stroke="#0E1014" stroke-width="1.5"></line>
        <line x1="24" y1="24" x2="36.99" y2="16.5" stroke="#0E1014" stroke-width="1.5"></line>
        <line x1="24" y1="24" x2="36.99" y2="31.5" stroke="#0E1014" stroke-width="1.5"></line>
        <line x1="24" y1="24" x2="24" y2="39" stroke="#0E1014" stroke-width="1.5"></line>
        <line x1="24" y1="24" x2="11.01" y2="31.5" stroke="#0E1014" stroke-width="1.5"></line>
        <line x1="24" y1="24" x2="11.01" y2="16.5" stroke="#0E1014" stroke-width="1.5"></line>
        <circle cx="24" cy="9" r="3" fill="#fff" stroke="#0E1014" stroke-width="1.6"></circle>
        <circle cx="36.99" cy="16.5" r="3" fill="#fff" stroke="#0E1014" stroke-width="1.6"></circle>
        <circle cx="36.99" cy="31.5" r="3" fill="#fff" stroke="#0E1014" stroke-width="1.6"></circle>
        <circle cx="24" cy="39" r="3" fill="#fff" stroke="#0E1014" stroke-width="1.6"></circle>
        <circle cx="11.01" cy="31.5" r="3" fill="#fff" stroke="#0E1014" stroke-width="1.6"></circle>
        <circle cx="11.01" cy="16.5" r="3" fill="#fff" stroke="#0E1014" stroke-width="1.6"></circle>
        <circle cx="24" cy="24" r="5" fill="#FF3D00"></circle>
        <text x="60" y="34" font-family="'Hanken Grotesk',Helvetica,Arial,sans-serif" font-size="31" font-weight="700" letter-spacing="-1.4" fill="#0E1014">thinktank</text>
      </svg>
      <span class="badge">local</span>
    </div>
    <p class="sub">One private memory for every AI.</p>

    <label for="project">Project</label>
    <input id="project" type="text" placeholder="web" />

    <label for="port">Local port</label>
    <div class="row">
      <input id="port" type="number" placeholder="4319" />
      <button class="btn-secondary" id="test">Test</button>
    </div>

    <button class="btn-primary" id="import-current">Import this chat</button>
    <button class="btn-secondary" id="import-all">Import all history</button>

    <div id="status"></div>

    <p class="note">
      <span class="dot"></span>
      <span>Your chats are sent only to thinktank on your own computer (127.0.0.1). Nothing ever leaves your device.</span>
    </p>

    <script src="popup.js"></script>
  </body>
</html>
