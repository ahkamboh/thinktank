<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>thinktank — my version + animated graph</title>
<link rel="icon" href="assets/logo/thinktank-mark.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#efe7d6; --bg2:#e7ddca; --paper:#f6f0e3; --card:#f4eddf;
    --ink:#1c1813; --ink-2:#3c352c; --ink-soft:#6b6256; --line:#d8cdb6; --line-strong:#c2b599;
    --accent:#FF3D00; --accent-deep:#b32a00; --accent-soft:#ffe5dc;
    --chip:#1b1712;
    --serif:"Fraunces",Georgia,serif; --sans:"Hanken Grotesk",system-ui,sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;
    background-image:radial-gradient(var(--line-strong) 1px, transparent 1px);background-size:26px 26px;background-position:-13px -13px;}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1140px;margin:0 auto;padding:0 28px}
  h1{font-family:var(--serif);font-weight:600;line-height:1.0;letter-spacing:-0.02em}
  .eyebrow{display:block;font-family:var(--mono);font-size:12.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep)}
  .muted{color:var(--ink-soft)}

  nav{height:70px;display:flex;align-items:center}
  .nav-in{display:flex;align-items:center;justify-content:space-between;width:100%}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-weight:600;font-size:21px}
  .brand img{height:26px}
  .nav-cta{background:var(--accent);color:#fff;padding:9px 17px;border-radius:9px;font-weight:700;font-size:14px}

  .hero{position:relative;padding:40px 0 80px;overflow:hidden}
  .hero-grid{display:grid;grid-template-columns:1.02fr .98fr;gap:48px;align-items:center}
  .hero h1{font-size:clamp(44px,6vw,78px);margin:18px 0 0}
  .hero h1 em{font-style:italic;font-weight:500;color:var(--accent)}
  .sub{font-size:clamp(17px,1.4vw,20px);color:var(--ink-2);max-width:42ch;margin-top:22px;line-height:1.5}
  .sub b{color:var(--ink);font-weight:600}
  .cta{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--sans);font-weight:700;font-size:16px;border-radius:12px;padding:14px 24px;cursor:pointer;border:1px solid transparent;transition:transform .15s,box-shadow .2s}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 12px 30px -12px var(--accent)}
  .btn-primary:hover{transform:translateY(-2px)}
  .btn-ghost{background:transparent;color:var(--ink);border-color:var(--line-strong)}
  .note{margin-top:20px;font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);display:flex;gap:8px;align-items:center}
  .note .dot{width:6px;height:6px;border-radius:50%;background:#4e7d43}

  /* ---- animated connection graph (v1 engine, themed for the warm page) ---- */
  .stage{position:relative;width:100%;max-width:540px;aspect-ratio:1/.94;margin:0 auto}
  .stage::before{content:"";position:absolute;left:50%;top:50%;width:62%;height:62%;transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(255,61,0,.12), transparent 68%);pointer-events:none}
  .stage canvas{position:absolute;inset:0;width:100%;height:100%}
  .hub{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:clamp(104px,15vw,128px);aspect-ratio:1;border-radius:50%;
    display:grid;place-items:center;z-index:4;
    background:radial-gradient(circle at 50% 38%, rgba(255,61,0,.30), #1a140f 72%);
    border:1px solid rgba(255,61,0,.45);
    box-shadow:0 0 0 1px rgba(255,61,0,.15), 0 0 56px -6px rgba(255,61,0,.55);
    animation:hubBeat 3.4s ease-in-out infinite}
  @keyframes hubBeat{0%,100%{box-shadow:0 0 0 1px rgba(255,61,0,.15),0 0 46px -8px rgba(255,61,0,.45)}
    50%{box-shadow:0 0 0 1px rgba(255,61,0,.32),0 0 80px -2px rgba(255,61,0,.7)}}
  .hub .hub-mark{width:56%;height:56%;display:grid;place-items:center}
  .hub-label{position:absolute;left:50%;bottom:-26px;transform:translateX(-50%);font-family:var(--mono);font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent-deep);white-space:nowrap}
  .node{position:absolute;transform:translate(-50%,-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:8px;transition:filter .3s,opacity .3s}
  .node .chip{width:clamp(54px,8vw,72px);aspect-ratio:1;border-radius:22%;display:grid;place-items:center;
    background:var(--chip);border:1px solid #2e261d;box-shadow:0 12px 28px -14px rgba(28,24,19,.55);
    transition:transform .28s cubic-bezier(.2,.7,.3,1),border-color .28s,box-shadow .28s}
  .node .glyph{width:52%;height:52%;display:grid;place-items:center}
  .node .glyph svg{width:100%;height:100%}
  .node .name{font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);transition:color .25s}
  .node:hover .chip,.node.active .chip{transform:scale(1.09);border-color:var(--accent);box-shadow:0 14px 34px -12px rgba(255,61,0,.45)}
  .node:hover .name,.node.active .name{color:var(--ink)}
  .stage.dimmed .node:not(.active){opacity:.4;filter:saturate(.6)}
  .mem{position:absolute;z-index:2;pointer-events:none;font-family:var(--mono);font-size:11.5px;color:var(--ink-2);
    padding:8px 12px;border-radius:10px;white-space:nowrap;background:var(--paper);border:1px solid var(--line-strong);
    box-shadow:0 12px 28px -16px rgba(28,24,19,.45);opacity:0;animation:memFloat 9s ease-in-out infinite}
  .mem .k{color:var(--accent-deep)} .mem b{color:var(--ink);font-weight:600}
  @keyframes memFloat{0%,100%{opacity:0;transform:translateY(8px)}12%,80%{opacity:1;transform:translateY(0)}}

  @media (max-width:920px){
    .hero-grid{grid-template-columns:1fr;gap:30px}
    .stage{max-width:440px;order:-1}
    .mem{display:none}
  }
</style>
</head>
<body>
<nav><div class="wrap nav-in">
  <a class="brand" href="#"><img src="assets/logo/thinktank-lockup-ink.svg" alt="thinktank" /></a>
  <a class="nav-cta" href="#">Get early access</a>
</div></nav>

<header class="hero">
  <div class="wrap hero-grid">
    <div>
      <span class="eyebrow">Local-first memory for AI</span>
      <h1>One memory.<br/><em>Every AI.</em></h1>
      <p class="sub">Cursor, Claude, ChatGPT, Gemini, Grok — <b>one private, on-device memory they all share.</b> Tell one, the rest remember.</p>
      <div class="cta">
        <a class="btn btn-primary" href="#">Get early access →</a>
        <a class="btn btn-ghost" href="#">See how it works</a>
      </div>
      <div class="note"><span class="dot"></span> Free &amp; open-source · local-first · <span class="muted">MIT licensed</span></div>
    </div>

    <div class="stage" id="stage" aria-hidden="true">
      <canvas id="wires"></canvas>
      <div class="hub"><span class="hub-mark" id="hubMark"></span><span class="hub-label">thinktank</span></div>
    </div>
  </div>
</header>

<script>

    { name:"Cursor",  color:"#D6D8DF", glyph:c=>`<svg viewBox="0 0 512 512" fill="none"><path d="m415.035 156.35-151.503-87.4695c-4.865-2.8094-10.868-2.8094-15.733 0l-151.4969 87.4695c-4.0897 2.362-6.6146 6.729-6.6146 11.459v176.383c0 4.73 2.5249 9.097 6.6146 11.458l151.5039 87.47c4.865 2.809 10.868 2.809 15.733 0l151.504-87.47c4.089-2.361 6.614-6.728 6.614-11.458v-176.383c0-4.73-2.525-9.097-6.614-11.459zm-9.516 18.528-146.255 253.32c-.988 1.707-3.599 1.01-3.599-.967v-165.872c0-3.314-1.771-6.379-4.644-8.044l-143.645-82.932c-1.707-.988-1.01-3.599.968-3.599h292.509c4.154 0 6.75 4.503 4.673 8.101h-.007z" fill="${c}"/></svg>` },
    { name:"Claude",  color:"#D97757", glyph:c=>`<svg viewBox="0 0 248 248" fill="none"><path d="M52.4285 162.873L98.7844 136.879L99.5485 134.602L98.7844 133.334H96.4921L88.7237 132.862L62.2346 132.153L39.3113 131.207L17.0249 130.026L11.4214 128.844L6.2 121.873L6.7094 118.447L11.4214 115.257L18.171 115.847L33.0711 116.911L55.485 118.447L71.6586 119.392L95.728 121.873H99.5485L100.058 120.337L98.7844 119.392L97.7656 118.447L74.5877 102.732L49.4995 86.1905L36.3823 76.62L29.3779 71.7757L25.8121 67.2858L24.2839 57.3608L30.6515 50.2716L39.3113 50.8623L41.4763 51.4531L50.2636 58.1879L68.9842 72.7209L93.4357 90.6804L97.0015 93.6343L98.4374 92.6652L98.6571 91.9801L97.0015 89.2625L83.757 65.2772L69.621 40.8192L63.2534 30.6579L61.5978 24.632C60.9565 22.1032 60.579 20.0111 60.579 17.4246L67.8381 7.49965L71.9133 6.19995L81.7193 7.49965L85.7946 11.0443L91.9074 24.9865L101.714 46.8451L116.996 76.62L121.453 85.4816L123.873 93.6343L124.764 96.1155H126.292V94.6976L127.566 77.9197L129.858 57.3608L132.15 30.8942L132.915 23.4505L136.608 14.4708L143.994 9.62643L149.725 12.344L154.437 19.0788L153.8 23.4505L150.998 41.6463L145.522 70.1215L141.957 89.2625H143.994L146.414 86.7813L156.093 74.0206L172.266 53.698L179.398 45.6635L187.803 36.802L193.152 32.5484H203.34L210.726 43.6549L207.415 55.1159L196.972 68.3492L188.312 79.5739L175.896 96.2095L168.191 109.585L168.882 110.689L170.738 110.53L198.755 104.504L213.91 101.787L231.994 98.7149L240.144 102.496L241.036 106.395L237.852 114.311L218.495 119.037L195.826 123.645L162.07 131.592L161.696 131.893L162.137 132.547L177.36 133.925L183.855 134.279H199.774L229.447 136.524L237.215 141.605L241.8 147.867L241.036 152.711L229.065 158.737L213.019 154.956L175.45 145.977L162.587 142.787H160.805V143.85L171.502 154.366L191.242 172.089L215.82 195.011L217.094 200.682L213.91 205.172L210.599 204.699L188.949 188.394L180.544 181.069L161.696 165.118H160.422V166.772L164.752 173.152L187.803 207.771L188.949 218.405L187.294 221.832L181.308 223.959L174.813 222.777L161.187 203.754L147.305 182.486L136.098 163.345L134.745 164.2L128.075 235.42L125.019 239.082L117.887 241.8L111.902 237.31L108.718 229.984L111.902 215.452L115.722 196.547L118.779 181.541L121.58 162.873L123.291 156.636L123.14 156.219L121.773 156.449L107.699 175.752L86.304 204.699L69.3663 222.777L65.291 224.431L58.2867 220.768L58.9235 214.27L62.8713 208.48L86.304 178.705L100.44 160.155L109.551 149.507L109.462 147.967L108.959 147.924L46.6977 188.512L35.6182 189.93L30.7788 185.44L31.4156 178.115L33.7079 175.752L52.4285 162.873Z" fill="${c}"/></svg>` },
    { name:"ChatGPT", color:"#ECEDF1", glyph:c=>`<svg viewBox="0 0 24 24" fill="none"><path d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.0729zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.1419.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.872zm16.5963 3.8558L13.1038 8.364 15.1192 7.2a.0757.0757 0 0 1 .071 0l4.8303 2.7913a4.4944 4.4944 0 0 1-.6765 8.1042v-5.6772a.79.79 0 0 0-.407-.667zm2.0107-3.0231l-.142-.0852-4.7735-2.7818a.7759.7759 0 0 0-.7854 0L9.409 9.2297V6.8974a.0662.0662 0 0 1 .0284-.0615l4.8303-2.7866a4.4992 4.4992 0 0 1 6.6802 4.66zM8.3065 12.863l-2.02-1.1638a.0804.0804 0 0 1-.038-.0567V6.0742a4.4992 4.4992 0 0 1 7.3757-3.4537l-.142.0805L8.704 5.459a.7948.7948 0 0 0-.3927.6813zm1.0976-2.3654l2.602-1.4998 2.6069 1.4998v2.9994l-2.5974 1.4997-2.6067-1.4997z" fill="${c}"/></svg>` },
    { name:"Gemini",  color:"#5C84D8", glyph:c=>{const g="ag"+(_gid++);return`<svg viewBox="0 0 28 28" fill="none"><defs><radialGradient id="${g}" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(2.77876 11.3795) rotate(18.6832) scale(29.8025 238.737)"><stop offset="0.067" stop-color="#9168C0"/><stop offset="0.343" stop-color="#5684D1"/><stop offset="0.672" stop-color="#1BA1E3"/></radialGradient></defs><path d="M14 28C14 26.0633 13.6267 24.2433 12.88 22.54C12.1567 20.8367 11.165 19.355 9.905 18.095C8.645 16.835 7.16333 15.8433 5.46 15.12C3.75667 14.3733 1.93667 14 0 14C1.93667 14 3.75667 13.6383 5.46 12.915C7.16333 12.1683 8.645 11.165 9.905 9.905C11.165 8.645 12.1567 7.16333 12.88 5.46C13.6267 3.75667 14 1.93667 14 0C14 1.93667 14.3617 3.75667 15.085 5.46C15.8317 7.16333 16.835 8.645 18.095 9.905C19.355 11.165 20.8367 12.1683 22.54 12.915C24.2433 13.6383 26.0633 14 28 14C26.0633 14 24.2433 14.3733 22.54 15.12C20.8367 15.8433 19.355 16.835 18.095 18.095C16.835 19.355 15.8317 20.8367 15.085 22.54C14.3617 24.2433 14 26.0633 14 28Z" fill="url(#${g})"/></svg>`} },
    { name:"Grok",    color:"#E8E9ED", glyph:c=>`<svg viewBox="0 0 32 32" fill="none"><path d="M11.5 25.5 L23.5 6.5 M16.5 25.5 L25.5 11.5" stroke="${c}" stroke-width="3" stroke-linecap="round"/></svg>` },
  ];
  let _gid = 0;

  function hubMark(){
    let s=""; for(let i=0;i<6;i++){const a=-Math.PI/2+i*Math.PI/3;const x=24+Math.cos(a)*17,y=24+Math.sin(a)*17;
      s+=`<line x1="24" y1="24" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#efe7d6" stroke-width="1.5" opacity="0.85"/><circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.8" fill="#efe7d6"/>`;}
    return `<svg viewBox="0 0 48 48" fill="none">${s}<circle cx="24" cy="24" r="6" fill="#1a140f" stroke="#FF3D00" stroke-width="1.9"/><circle cx="24" cy="24" r="2.6" fill="#FF3D00"/></svg>`;
  }
  document.getElementById("hubMark").innerHTML = hubMark();

  /* ---- v1 pulse-graph engine, themed orange for the warm page ---- */
  (function(){
    const stage = document.getElementById("stage");
    const canvas = document.getElementById("wires");
    const ctx = canvas.getContext("2d");
    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    const TH = { in:"#FF3D00", out:"#FF9A3D", wire:"#FF5A1E", tick:"#c2410c" };
    let W=0,H=0,dpr=1, nodes=[], hub={x:0,y:0}, activeIdx=-1;
    const pulses=[], rings=[];

    const nodeEls = TOOLS.map((t,i)=>{
      const el=document.createElement("div"); el.className="node";
      el.innerHTML=`<div class="chip"><span class="glyph">${t.glyph(t.color)}</span></div><span class="name">${t.name}</span>`;
      stage.appendChild(el);
      el.addEventListener("pointerenter",()=>{activeIdx=i;el.classList.add("active");stage.classList.add("dimmed");});
      el.addEventListener("pointerleave",()=>{activeIdx=-1;el.classList.remove("active");stage.classList.remove("dimmed");});
      return el;
    });

    const cards=[
      {h:`<span class="k">decision</span>&nbsp; use JWT, <b>not</b> sessions`, x:"-3%", y:"15%", d:"0s"},
      {h:`<span class="k">pref</span>&nbsp; package manager → <b>pnpm</b>`, x:"72%", y:"6%", d:"3s"},
      {h:`<span class="k">context</span>&nbsp; prod DB is <b>read-only</b>`, x:"-5%", y:"76%", d:"6s"},
      {h:`<span class="k">style</span>&nbsp; <b>tabs</b>, width 2`, x:"74%", y:"82%", d:"4.5s"},
    ];
    cards.forEach(c=>{const m=document.createElement("div");m.className="mem";m.style.left=c.x;m.style.top=c.y;m.style.animationDelay=c.d;m.innerHTML=c.h;stage.appendChild(m);});

    function layout(){
      const r=stage.getBoundingClientRect(); W=r.width;H=r.height;dpr=Math.min(devicePixelRatio||1,2);
      canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
      hub={x:W/2,y:H/2}; const R=Math.min(W,H)*0.40; const off=-Math.PI/2-Math.PI/nodeEls.length;
      nodes=nodeEls.map((el,i)=>{const a=off+i*2*Math.PI/nodeEls.length;const x=W/2+Math.cos(a)*R,y=H/2+Math.sin(a)*R;el.style.left=x+"px";el.style.top=y+"px";return{el,center:{x,y},color:TOOLS[i].color};});
    }
    layout(); new ResizeObserver(layout).observe(stage); addEventListener("resize",layout);

    const hexA=(h,a)=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;};
    const easeIn=t=>t*t, easeOut=t=>1-(1-t)*(1-t);
    function dot(x,y,r,c,blur){ctx.save();ctx.shadowColor=c;ctx.shadowBlur=blur;ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.restore();}
    function spawn(from,to,dur,kind){pulses.push({from,to,dur,kind,start:performance.now()});}

    function cycle(){
      if(document.hidden){setTimeout(cycle,1200);return;}
      const s=activeIdx>=0?activeIdx:Math.floor(Math.random()*nodes.length);
      spawn(nodes[s].center,hub,820,"in");
      setTimeout(()=>{rings.push({x:hub.x,y:hub.y,start:performance.now(),dur:700});nodes.forEach((n,i)=>{if(i!==s)spawn(hub,n.center,760+Math.random()*260,"out");});},820);
      setTimeout(cycle,2300+Math.random()*900);
    }

    function draw(now){
      ctx.clearRect(0,0,W,H);
      nodes.forEach((n,i)=>{
        const active=activeIdx===i, dim=activeIdx>=0&&!active;
        ctx.strokeStyle=hexA(active?n.color:TH.wire, dim?0.06:active?0.55:0.22);
        ctx.lineWidth=active?1.8:1; ctx.beginPath();ctx.moveTo(n.center.x,n.center.y);ctx.lineTo(hub.x,hub.y);ctx.stroke();
        if(!reduce&&!dim){const tt=((now/2600)+i*0.2)%1;const px=n.center.x+(hub.x-n.center.x)*tt,py=n.center.y+(hub.y-n.center.y)*tt;dot(px,py,active?2:1.3,hexA(active?n.color:TH.tick,active?0.9:0.42),active?10:4);}
      });
      for(let i=rings.length-1;i>=0;i--){const rg=rings[i],p=(now-rg.start)/rg.dur;if(p>=1){rings.splice(i,1);continue;}ctx.strokeStyle=hexA(TH.in,(1-p)*0.5);ctx.lineWidth=2;ctx.beginPath();ctx.arc(rg.x,rg.y,30+p*70,0,Math.PI*2);ctx.stroke();}
      for(let i=pulses.length-1;i>=0;i--){const pl=pulses[i],p=(now-pl.start)/pl.dur;if(p>=1){pulses.splice(i,1);continue;}
        const e=pl.kind==="in"?easeIn(p):easeOut(p);const x=pl.from.x+(pl.to.x-pl.from.x)*e,y=pl.from.y+(pl.to.y-pl.from.y)*e;
        const core=pl.kind==="in"?TH.in:TH.out;
        const bx=pl.from.x+(pl.to.x-pl.from.x)*Math.max(0,e-0.1),by=pl.from.y+(pl.to.y-pl.from.y)*Math.max(0,e-0.1);
        const tg=ctx.createLinearGradient(bx,by,x,y);tg.addColorStop(0,hexA(core,0));tg.addColorStop(1,hexA(core,0.85));
        ctx.strokeStyle=tg;ctx.lineWidth=2.6;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(x,y);ctx.stroke();
        dot(x,y,3.6,core,16); dot(x,y,1.6,"#fff",6);
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
    if(!reduce) cycle(); else setTimeout(cycle,500);
  })();
</script>
